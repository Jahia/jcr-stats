query getTree($path: String, $maxDepth: Int) {
    jcrStats {
        tree(path: $path, maxDepth: $maxDepth) {
            name
            path
            size
            nodeCount
            children {
                name
                path
                size
                nodeCount
                children {
                    name
                    path
                    size
                    nodeCount
                }
            }
        }
    }
}
